<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - SentryRoad</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body style="margin:0; background:#f3f4f6; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color:#111827;">
<section class="page-section">
  <div class="auth-wrapper">
    <div class="auth-card">
      <h2 class="auth-title">Reset your password</h2>
      <p class="auth-sub">
        {% if stage == 'verify' %}
          We sent an OTP to {{ email }}. Enter it below to set a new password.
        {% else %}
          Enter your account email and we'll send you a one-time password (OTP).
        {% endif %}
      </p>

      {% if stage == 'verify' %}
      <!-- Verify OTP and reset -->
      <form method="post" action="/forgot_password" class="auth-form" id="otpForm">
        <input type="hidden" name="action" value="reset" />
        <div class="form-group">
          <label for="fp_email">Email</label>
          <input type="email" id="fp_email" name="email" value="{{ email }}" readonly />
        </div>
        <div class="form-group">
            <label for="fp_otp">OTP</label>
                <input type="text"
                     id="fp_otp"
                     name="otp"
                     placeholder="Enter 6-digit code"
                     inputmode="numeric"
                     pattern="[0-9]{6}"
                     maxlength="6"
                     minlength="6"
                     required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="fp_new">New Password</label>
            <input type="password" id="fp_new" name="new_password" placeholder="Enter new password" required />
          </div>
          <div class="form-group">
            <label for="fp_confirm">Confirm Password</label>
            <input type="password" id="fp_confirm" name="confirm_password" placeholder="Retype new password" required />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Verify & Update</button>
          <a href="/forgot_password" class="btn btn-outline">Resend</a>
          <a href="/login" class="btn btn-outline">Back to Login</a>
        </div>
      </form>
      {% else %}
      <!-- Request OTP -->
      <form method="post" action="/forgot_password" class="auth-form" id="requestForm">
        <input type="hidden" name="action" value="send_otp" />
        <div class="form-group">
          <label for="rq_email">Email</label>
          <input type="email" id="rq_email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Send OTP</button>
          <a href="/login" class="btn btn-outline">Back to Login</a>
        </div>
      </form>
      {% endif %}
    </div>
  </div>
</section>

<style>
.page-section{padding:1rem}
.auth-wrapper{display:flex;justify-content:center;align-items:center}
.auth-card{width:100%;max-width:560px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1.25rem}
.auth-title{margin:0 0 .25rem 0}
.auth-sub{margin:0 0 .75rem 0;color:#6b7280}
.auth-form .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column}
.form-group label{font-weight:600;margin-bottom:.35rem}
.form-group input{padding:.6rem .75rem;border:1px solid #e5e7eb;border-radius:8px}
.form-actions{margin-top:1rem;display:flex;gap:.75rem}
.btn{padding:.6rem .9rem;border-radius:8px;border:1px solid transparent;cursor:pointer;text-decoration:none;display:inline-block}
.btn-primary{background:#5D6CC0;color:#fff}
.btn-outline{background:#fff;border-color:#cfd3e1;color:#374151}
@media(max-width:600px){.auth-form .form-row{grid-template-columns:1fr}}
</style>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const requestForm = document.getElementById('requestForm');
  if(requestForm){
    requestForm.addEventListener('submit', function(e){
      const email = (document.getElementById('rq_email')?.value||'').trim();
      if(!email){ e.preventDefault(); alert('Please enter your email.'); }
    });
  }

  const otpForm = document.getElementById('otpForm');
  if(otpForm){
    otpForm.addEventListener('submit', function(e){
      const email = (document.getElementById('fp_email')?.value||'').trim();
      const otp = (document.getElementById('fp_otp')?.value||'').trim();
      const p1 = document.getElementById('fp_new')?.value||'';
      const p2 = document.getElementById('fp_confirm')?.value||'';
      if(!email || !otp || !p1 || !p2){ e.preventDefault(); alert('All fields are required.'); return; }
      if(!/^\d{6}$/.test(otp)){ e.preventDefault(); alert('OTP must be 6 digits.'); return; }
      if(p1 !== p2){ e.preventDefault(); alert('Passwords do not match.'); return; }
    });
  }
});
</script>
</body>
</html>
